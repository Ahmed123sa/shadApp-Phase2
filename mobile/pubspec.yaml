name: shadapp_client
description: ShadApp - Client Mobile Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  http: ^1.2.0
  shared_preferences: ^2.3.0
  file_picker: ^8.0.0
  image_picker: ^1.0.0
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  url_launcher: ^6.3.0
  go_router: ^14.0.0
  web_socket_channel: ^3.0.0
  fl_chart: ^0.70.0
  firebase_core: ^3.12.0
  firebase_messaging: ^15.2.0
  flutter_local_notifications: ^18.0.0
  flutter_secure_storage: ^9.2.0
  flutter_dotenv: ^5.1.0
  provider: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/env.txt

